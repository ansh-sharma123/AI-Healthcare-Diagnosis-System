diabetes:
  display_name: "Diabetes"
  model_type:
    classification: true
    regression: true

  targets:
    classification: outcome
    regression: risk_score

  risk_levels:
    low:
      min: 0.0
      max: 0.3
      label: "Low Risk"
      color: "green"
      advice: "Maintain a healthy lifestyle and regular checkups."

    medium:
      min: 0.3
      max: 0.6
      label: "Medium Risk"
      color: "orange"
      advice: "Monitor glucose levels and consult a doctor."

    high:
      min: 0.6
      max: 1.0
      label: "High Risk"
      color: "red"
      advice: "Immediate medical consultation is recommended."